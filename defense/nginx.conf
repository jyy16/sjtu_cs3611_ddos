# CS3611 DDoS demo reverse proxy / CDN-style edge configuration.
#
# Validate:
#   nginx -t -c /absolute/path/to/defense/nginx.conf
#
# Run:
#   nginx -c /absolute/path/to/defense/nginx.conf
#
# Demo flow:
#   client -> http://127.0.0.1:8081/ -> origin pool -> http://127.0.0.1:8080/

worker_processes auto;
pid /tmp/cs3611-nginx.pid;
error_log /tmp/cs3611-nginx-error.log warn;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr cache=$upstream_cache_status '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /tmp/cs3611-nginx-access.log main;

    limit_req_zone $binary_remote_addr zone=cs3611_http_per_ip:10m rate=120r/s;
    limit_conn_zone $binary_remote_addr zone=cs3611_conn_per_ip:10m;

    proxy_cache_path /tmp/cs3611-nginx-cache
        levels=1:2
        keys_zone=cs3611_edge_cache:10m
        max_size=128m
        inactive=10m
        use_temp_path=off;

    upstream cs3611_origin_pool {
        least_conn;

        # Local demo origin started by scripts/run_demo.sh.
        server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;

        # Mininet or multi-origin demo examples:
        # server 10.0.0.2:80 max_fails=3 fail_timeout=10s;
        # server 10.0.0.3:80 backup;
    }

    server {
        listen 8081;
        server_name _;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            limit_req zone=cs3611_http_per_ip burst=240 nodelay;
            limit_conn cs3611_conn_per_ip 80;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header X-Origin-IP;
            proxy_hide_header X-Backend-Server;
            proxy_hide_header X-Powered-By;

            proxy_connect_timeout 2s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            proxy_cache cs3611_edge_cache;
            proxy_cache_valid 200 302 10s;
            proxy_cache_valid 404 1s;
            proxy_cache_bypass $http_cache_control $http_pragma;

            add_header X-CS3611-Edge "nginx-reverse-proxy" always;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_pass http://cs3611_origin_pool;
        }
    }
}
